function useActiveSection(ids) {
  const [active, setActive] = useState(ids[0]);
  useEffect(() => {
    const onScroll = () => {
      const y = window.scrollY + 140;
      let cur = ids[0];
      for (const id of ids) {
        const el = document.getElementById(id);
        if (el && el.offsetTop <= y) cur = id;
      }
      setActive(cur);
    };
    onScroll();
    window.addEventListener("scroll", onScroll, { passive: true });
    return () => window.removeEventListener("scroll", onScroll);
  }, [ids.join("|")]);
  return active;
}

function useReveal() {
  useEffect(() => {
    const els = document.querySelectorAll("[data-reveal]");
    const io = new IntersectionObserver((entries) => {
      entries.forEach((e) => {
        if (e.isIntersecting) {
          e.target.setAttribute("data-revealed", "true");
          io.unobserve(e.target);
        }
      });
    }, { threshold: 0.12 });
    els.forEach((el) => io.observe(el));
    return () => io.disconnect();
  }, []);
}

function useTime() {
  const [now, setNow] = useState(new Date());
  useEffect(() => {
    const t = setInterval(() => setNow(new Date()), 1000);

}

function CiteSpark() {
  // simple inline sparkline 2023–2026
  const data = [0, 1, 18, 9];
  const max = Math.max(...data);
  const w = 220, h = 56, pad = 4;
  const dx = (w - pad * 2) / (data.length - 1);
  const pts = data.map((v, i) => [pad + i * dx, h - pad - (v / max) * (h - pad * 2)]);
  const path = pts.map((p, i) => (i ? "L" : "M") + p[0].toFixed(1) + " " + p[1].toFixed(1)).join(" ");
  return (
    <div className="cite-bar__cell cite-bar__cell--spark">
      <Mono style={{ color: "var(--ink-3)" }}>citations / yr</Mono>
      <svg width={w} height={h} style={{ marginTop: 4 }}>
        <path d={path} fill="none" stroke="var(--accent)" strokeWidth="1.6" />
        {pts.map((p, i) => (
          <circle key={i} cx={p[0]} cy={p[1]} r="2.5" fill="var(--accent)" />
        ))}
      </svg>
      <div style={{ display: "flex", justifyContent: "space-between", fontFamily: "var(--mono)", fontSize: 10, color: "var(--ink-3)", marginTop: -4 }}>
        <span>'23</span><span>'24</span><span>'25</span><span>'26</span>
      </div>
    </div>
  );
}

/* ------------------------------------------------------------------ */
/* App                                                                 */
/* ------------------------------------------------------------------ */
function App() {
  const [theme, setTheme] = useState(() => localStorage.getItem("aa.theme") || "light");
  const active = useActiveSection(NAV.map((n) => n.id));
  useReveal();

  useEffect(() => {
    document.documentElement.setAttribute("data-theme", theme);
    localStorage.setItem("aa.theme", theme);
  }, [theme]);

  return (
    <div className="page">
      <Nav active={active} theme={theme} toggleTheme={() => setTheme((t) => (t === "dark" ? "light" : "dark"))} />
      <Hero />
      <About />
      <Focus />
      <Experience />
      <Research />
      <Expertise />
      <Projects />
      <Footer />
    </div>
  );
}

ReactDOM.createRoot(document.getElementById("root")).render(<App />);

`;

const style = document.createElement("style");
style.textContent = css;
document.head.appendChild(style);

/* project hover mouse-follow glow */
document.addEventListener("mousemove", (e) => {
  const card = e.target.closest && e.target.closest(".proj");
  if (!card) return;
  const r = card.getBoundingClientRect();
  card.style.setProperty("--mx", ((e.clientX - r.left) / r.width) * 100 + "%");
  card.style.setProperty("--my", ((e.clientY - r.top) / r.height) * 100 + "%");
});

</script>
